name: test-perl

permissions: {}

on:
  push:
    branches:
      - main
      - renovate/**
    paths:
      - perl/**
      - testdata/**
      - .github/**
  pull_request:
    branches:
      - main
      - renovate/**
    paths:
      - perl/**
      - testdata/**
      - .github/**

jobs:
  test-perl:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        perl: [ "5.14", "5.20", "5.26", "5.32" ]
    steps:
    - name: Check out repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - name: Setup Perl environment
      uses: shogo82148/actions-setup-perl@3d3cb73ca65d657a809d97eab324d4e4f140bf5e # v1.42.0
      with:
        perl-version: ${{ matrix.perl }}
        working-directory: perl
    - name: Run tests
      working-directory: perl
      run: make test
    # Run author tests second so as to not 'contaminate' the environment
    # with dependencies listed as author deps when they should have been
    # listed as general deps
    - name: Run author tests
      working-directory: perl
      run: make authortest
