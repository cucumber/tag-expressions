name: test-perl

permissions: {}

on:
  push:
    branches:
      - main
      - renovate/**
    paths:
      - perl/**
      - testdata/**
      - .github/**
  pull_request:
    branches:
      - main
      - renovate/**
    paths:
      - perl/**
      - testdata/**
      - .github/**

jobs:
  test-perl:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        perl: [ "5.14", "5.20", "5.26", "5.32" ]
    steps:
    - name: Check out repository
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false
    - name: Setup Perl environment
      uses: shogo82148/actions-setup-perl@a198315ec4e9244f206879ea7b63078003aec8a6 # v1.41.1
      with:
        perl-version: ${{ matrix.perl }}
        working-directory: perl
    - name: Run tests
      working-directory: perl
      run: make test
    # Run author tests second so as to not 'contaminate' the environment
    # with dependencies listed as author deps when they should have been
    # listed as general deps
    - name: Run author tests
      working-directory: perl
      run: make authortest
